name: Generate contribution snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/snake.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/generated/github-contribution-grid-snake.svg
            assets/generated/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit generated snake
        run: |
          if git diff --quiet -- assets/generated/github-contribution-grid-snake*.svg; then
            echo "Snake SVGs already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/generated/github-contribution-grid-snake*.svg
          git commit -m "Update contribution snake"
          git push
